function hashAthletes(arr) {

}

// ── SYNC ENGINE ────────────────────────────────────────────
let _ghSha = null;
let _writeInProgress = false;
let _pendingWrite = null;

async function ghRead() {
  try {
    // Use contents API so we always get the SHA too
    const r = await fetch(GH_URL() + '?t=' + Date.now(), {
      headers: { 'Authorization': 'token ' + GH_CONFIG.token, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (!r.ok) return null;
    const j = await r.json();
    _ghSha = j.sha;
    const text = decodeURIComponent(escape(atob(j.content.replace(/\n/g,''))));
    return JSON.parse(text);
  } catch(e) { console.warn('GH read error', e); return null; }
}

async function _doWrite(athletes) {
  if (!_ghSha) {
    // Need SHA first — do a read
    await ghRead();
  }
  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(athletes))));
  const r = await fetch(GH_URL(), {
    method: 'PUT',
    headers: { 'Authorization': 'token ' + GH_CONFIG.token, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
    body: JSON.stringify({ message: 'sync: ' + new Date().toISOString(), content: encoded, sha: _ghSha })
  });
  const j = await r.json();
  if (j.content && j.content.sha) {
    _ghSha = j.content.sha;
    return true;
  }
  if (j.message && j.message.includes('does not match')) {
    // SHA conflict — refresh and retry once
    _ghSha = null;
    await ghRead();
    return _doWrite(athletes);
  }
  console.warn('GH write failed', j.message);
  return false;
}

async function ghWrite(athletes) {
  // Queue writes — never run two simultaneously
  if (_writeInProgress) {
    _pendingWrite = athletes;
    return;
  }
  _writeInProgress = true;
  try {
    await _doWrite(athletes);
    // If another write was queued while we were busy, send it now
    if (_pendingWrite) {
      const next = _pendingWrite;
      _pendingWrite = null;
      await _doWrite(next);
    }
  } catch(e) {
    console.warn('GH write error', e);
    _ghSha = null; // Force SHA refresh on next write
  } finally {
    _writeInProgress = false;
  }
}

function posAbbr(p){
  if(!p) return '---'; const s=p.toLowerCase();
  if(s.includes('setter')||s==='s') return 'S';
  if(s.includes('middle')||s==='mb') return 'M';
  if(s.includes('outside')||s==='oh') return 'OH';
  if(s.includes('right side')||s==='rs') return 'RS';
  if(s.includes('defensive')||s==='ds') return 'DS';
  if(s.includes('libero')||s==='l') return 'L';
  if(s.includes('unsure')) return '?';
  return p.substring(0,3).toUpperCase();
}
function classifyPos(p){
  if(!p || p==='N/A') return 'unsorted';
  const s=p.toLowerCase().trim();
  // Direct full-name matches first
  if(s==='setter') return 'setter';
  if(s==='middle hitter' || s==='middle blocker') return 'middle';
  if(s==='outside hitter') return 'outside';
  if(s==='right side hitter' || s==='right side' || s==='opposite') return 'outside';
  if(s==='defensive specialist' || s==='libero') return 'defense';
  // Then abbreviation matching
  for(const c of POS_CATS) {
    if(c.abbrs.some(a => a.length <= 2 ? s === a : s.includes(a))) return c.key;
  }
  return 'unsorted';
}
function getPosCategories(p1, p2) {
  const res = new Set();
  [p1, p2].forEach(p => {
    if (!p || p === 'N/A') return;
    if(!p || p === 'N/A' || p === 'none') return;
    const s = p.toLowerCase();
    for (const c of POS_CATS) {
      if (c.abbrs.some(a => a.length <= 2 ? s === a : s.includes(a))) res.add(c.key);
    }
  });
  return res.size ? Array.from(res) : ['unsorted'];
}
function getAthleteCategories(a) {
  const cats = new Set();
  cats.add(classifyPos(a.primaryPos));
  if (a.altPos && a.altPos !== 'N/A' && a.altPos !== 'none') cats.add(classifyPos(a.altPos));
  return Array.from(cats);
}
function divAge(d){const m=(d||'').match(/(\d+)/);return m?m[1]:'';}
function sAvg(metrics, key) {
  // Use a single loop to avoid multiple iterations and intermediate array allocations
  const values = (metrics || {})[key];
  if (!values || !values.length) return null;
  let sum = 0, count = 0;
  for (let i = 0, len = values.length; i < len; i++) {
    const val = values[i];
    if (val !== '' && val !== null) {
      const num = Number(val);
      if (!isNaN(num)) {
        sum += num;
        count++;
      }
    }
  }
  return count > 0 ? sum / count : null;
}
function totalScore(metrics, drillScore){
  let s=0,c=0;
  STATIONS.filter(st=>st.key!=='checkin').forEach(st=>{
    const a=sAvg(metrics,st.key);
    if(a!==null){s+=a;c++;}
  });
  if(drillScore && !isNaN(Number(drillScore))){
    s += Number(drillScore);
    c++;
  }
  return c>0?(s/c).toFixed(1):null;
}
function scoreColor(sc){return Number(sc)>=7?'#66bb6a':Number(sc)>=5?'#ffa726':'#ef5350';}
let toN=100;
function mkId(){return Math.random().toString(36).substr(2,6);}
function initAthletes(raw){
  return raw.filter(a=>a.first).map(a=>({
    ...a,
    id:a.id||(a.to?`to-${a.to}`:`${a.first}-${a.last}-${a.dob}`.toLowerCase().replace(/[^a-z0-9]/g,'-')),
    to:a.to||String(toN++),
    ageGroup:divAge(a.division),
    posCategory:classifyPos(a.primaryPos),
    posCategories:getAthleteCategories(a),
    posCategories:getPosCategories(a.primaryPos, a.altPos),
    status:a.status||'pending',
    teamAssignment:a.teamAssignment||null,
    teamLocked:a.teamLocked||false,
    coachPos:a.coachPos||'',
    hidden:a.hidden||false,
    hideReason:a.hideReason||'',
    isWalkup:a.isWalkup||false,
    arrived:a.arrived||false,
    notes:a.notes||'',
    wontAccept:a.wontAccept||'',
    drillScore:a.drillScore||'',
    metrics:a.metrics||{},
  }));
}
function saveLocal(a){
  try{localStorage.setItem(LOCAL_KEY,JSON.stringify(a));}catch(e){}
  // Mirror to GitHub for cross-machine sync

}

function exportCSV(rows,name){
  const csv=rows.map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=name; a.click();
}

const logEmail = (recipientName, recipientEmail, type, status, content) => {
  try {
    const logs = JSON.parse(localStorage.getItem('midtn_email_logs') || '[]');
    const newLog = {
      id: Math.random().toString(36).substr(2, 6),
      date: new Date().toLocaleString(),
      recipientName,
      recipientEmail,
      type,
      status,
      content: content.substring(0, 100) + (content.length > 100 ? '...' : '')
    };
    const nextLogs = [newLog, ...logs].slice(0, 100);
    localStorage.setItem('midtn_email_logs', JSON.stringify(nextLogs));
    window.dispatchEvent(new StorageEvent('storage', { key: 'midtn_email_logs', newValue: JSON.stringify(nextLogs) }));
  } catch (e) {
    console.error('Failed to log email:', e);
  }
};

function Stopwatch({ onApply, label="Stopwatch" }) {
  const [time, setTime] = useState(0);
  const [running, setRunning] = useState(false);
  const startRef = useRef(0);
  const animRef = useRef(0);

  const tick = useCallback(() => {
    setTime(Date.now() - startRef.current);
    animRef.current = requestAnimationFrame(tick);
  }, []);

  const handleStart = () => {
    if (running) {
      cancelAnimationFrame(animRef.current);
      setRunning(false);
    } else {
      startRef.current = Date.now() - time;
      setRunning(true);
      animRef.current = requestAnimationFrame(tick);
    }
  };

  const handleReset = () => {
    cancelAnimationFrame(animRef.current);
    setRunning(false);
    setTime(0);
  };

  useEffect(() => {
    return () => cancelAnimationFrame(animRef.current);
  }, []);

  const formatTime = (ms) => {
    const min = Math.floor(ms / 60000);
    const sec = Math.floor((ms % 60000) / 1000);
    const hundredths = Math.floor((ms % 1000) / 10);
    return `${min > 0 ? min + ':' : ''}${sec.toString().padStart(2, '0')}.${hundredths.toString().padStart(2, '0')}`;
  };

  const seconds = (time / 1000).toFixed(2);

  return html`
    <div style=${{ background: '#12151c', border: '1px solid #2a2e38', borderRadius: '10px', padding: '12px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '8px', marginTop: '10px', marginBottom: '10px' }}>
      <div style=${{ fontSize: '10px', color: '#78909c', textTransform: 'uppercase', fontWeight: 700 }}>${label}</div>
      <div style=${{ fontFamily: 'monospace', fontSize: '28px', fontWeight: 800, color: '#f0a500', letterSpacing: '1px' }}>${formatTime(time)}</div>
      <div style=${{ display: 'flex', gap: '6px', width: '100%' }}>
        <button class="btn btn-sm" onClick=${handleStart} style=${{ flex: 1, background: running ? '#ef5350' : '#66bb6a', color: '#fff' }}>
          ${running ? 'Pause' : 'Start'}
        </button>
        <button class="btn btn-sm btn-outline" onClick=${handleReset} style=${{ flex: 1, borderColor: '#78909c', color: '#78909c' }}>
          Reset
        </button>
        ${onApply && html`
          <button class="btn btn-sm" onClick=${() => onApply(seconds)} style=${{ flex: 1.2, background: '#4fc3f7', color: '#000', fontWeight: 700 }}>
            Apply (${seconds}s)
          </button>
        `}
      </div>
    </div>
  `;
}

              Need Help? Read Tryout FAQ / Instructions
            </a>
          </div>
        `}
      </div>
    </div>
  `;

function Login({onLogin}){
  const [pin,setPin]=useState('');
  const [err,setErr]=useState('');
  const go=()=>{
    if(pin===HC_PIN){onLogin({role:'hc'});return;}
    if(pin===STAFF_PIN){onLogin({role:'staff', tab:'s1'});return;}
    if(pin===CHECKIN_PIN){onLogin({role:'staff', tab:'checkin'});return;}
    if(pin===STATION2_PIN){onLogin({role:'staff', tab:'s2'});return;}
    setPin('');setErr('Invalid PIN');
  };

  const walkupUrl = getWalkupUrl();
  const faqUrl = getFaqUrl();

function CheckInConfirmModal({ athlete, onClose, onConfirm }) {
  if (!athlete) return null;
  const [phone, setPhone] = useState(athlete.phone || '');
  const [email, setEmail] = useState(athlete.email || '');

  const handleConfirm = () => {
    if (!phone.trim() || !email.trim()) return;
    onConfirm(athlete.id, { phone: phone.trim(), email: email.trim() });
  };

  const isValid = phone.trim().length >= 7 && email.trim().includes('@');

  return html`
    <div class="modal-overlay">
      <div class="modal-box" style=${{maxWidth:400,width:'95%'}}>
        <h3 style=${{margin:'0 0 12px',color:'#f0a500',fontSize:18,fontWeight:800}}>Confirm Contact Info</h3>
        <p style=${{fontSize:12,color:'#78909c',marginBottom:16,lineHeight:1.4}}>
          Please confirm or update contact details for <strong>${athlete.first} ${athlete.last}</strong> (#${athlete.to}) before check-in:
        </p>

// -- STAFF HUB (DASHBOARD & STATIONS) -
// -- SYNC STATUS INDICATOR ──────────────────────────────────────
function SyncStatus({athletes, setAthletes}) {
  const [status, setStatus] = useState('syncing');
  const [lastSync, setLastSync] = useState(null);
  const [pushing, setPushing] = useState(false);

  const doSync = async (pushFirst) => {
    try {
      setStatus('syncing');
      if (pushFirst && athletes && athletes.length) {
        setPushing(true);
        await ghWrite(athletes);
      }
      const remote = await ghRead();
      if (remote && remote.length) {
        if(setAthletes) setAthletes(remote);
        try { localStorage.setItem(LOCAL_KEY, JSON.stringify(remote)); } catch(e) {}
        setLastSync(new Date().toLocaleTimeString());
        setStatus('ok');
      }
    } catch(e) { setStatus('error'); }
    finally { setPushing(false); }
  };

  useEffect(() => {
    doSync(false);
    const t = setInterval(() => doSync(false), GH_CONFIG.poll);
    return () => clearInterval(t);
  }, []);

  const dotColor = status==='ok'?'#66bb6a':status==='error'?'#ef5350':'#ffa726';
  const label = status==='ok'?'NETLIFY SYNC':status==='error'?'SYNC ERROR':'SYNCING...';
  return html`<div style=${{display:'flex',alignItems:'center',gap:6}}>
    <span style=${{fontSize:11,padding:'2px 8px',color:dotColor,background:'#1a1e24',borderRadius:4,display:'inline-flex',alignItems:'center',gap:4}}>
      <span style=${{width:6,height:6,borderRadius:'50%',background:dotColor,display:'inline-block'}}></span>
      ${label}${lastSync?html`<span style=${{color:'#546e7a',marginLeft:4}}>${lastSync}</span>`:''}
    </span>
    <button onClick=${()=>doSync(true)} disabled=${pushing} style=${{padding:'3px 10px',background:pushing?'#2a2e38':'#f0a500',color:pushing?'#546e7a':'#000',border:'none',borderRadius:4,fontSize:11,fontWeight:800,cursor:pushing?'wait':'pointer'}}>${pushing?'Syncing...':'Push & Sync'}</button>
  </div>`;
}

    const s2 = ath.metrics?.s2 || [];

function AthleteModal({athlete,onClose,onChange,onHide,onUnhide,onEmail}){
  if(!athlete) return null;
  const locked = athlete.teamLocked || athlete.status === 'accepted';
  const sc = totalScore(athlete.metrics, athlete.drillScore);
  const [ef,setEf]=useState(null);
  const [ev,setEv]=useState('');
  const [showStopwatch, setShowStopwatch] = useState(false);

  const startEdit=(k,v)=>{if(locked)return;setEf(k);setEv(v||'');};
  const saveEdit=()=>{if(ef){onChange(athlete.id,{[ef]:ev});setEf(null);}};
  const F=(label,key,opts)=>html`
    <div>
      <div class="label">${label}</div>
      ${ef===key?(opts
        ?html`<select class="select" value=${ev} onChange=${e=>setEv(e.target.value)} onBlur=${saveEdit} autoFocus>${opts.map(o=>html`<option>${o}</option>`)}</select>`
        :html`<input class="input" value=${ev} onInput=${e=>setEv(e.target.value)} onBlur=${saveEdit} onKeyDown=${e=>e.key==='Enter'&&saveEdit()} autoFocus style=${{fontSize:13,padding:'6px 8px'}}/>`)
      :html`<div onClick=${()=>startEdit(key,athlete[key])} style=${{fontSize:13,color:athlete[key]?'#e8eaed':'#444',cursor:locked?'default':'pointer',padding:'2px 0',borderBottom:'1px dashed #2a2e38',wordBreak:'break-all',minHeight:20}}>
        ${athlete[key]||'"”'}${!locked&&html`<span style=${{color:'#4fc3f7',marginLeft:4,fontSize:10}}>✎</span>`}
      </div>`}
    </div>`;

    <div class="modal-overlay" onClick=${onClose}>
      <div class="modal-box" style=${{width:640}} onClick=${e=>e.stopPropagation()}>

          ${F('Primary Position','primaryPos',['Outside Hitter','Middle Hitter','Setter','Right Side Hitter','Defensive Specialist','Libero','I am unsure'])}
          ${F('Alt Position','altPos',['Outside Hitter','Middle Hitter','Setter','Right Side Hitter','Defensive Specialist','Libero','N/A'])}

        <div style=${{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
          ${!locked&&html`

              <${Btn} onClick=${()=>{onEmail(athlete, 'report');onClose();}} color="#26c6da" outline style=${{borderWidth:2}}>📊 Report<//>

          ${!locked&&!athlete.hidden&&html`<${Btn} onClick=${()=>{onHide(athlete);onClose();}} danger outline>Hide<//>`}
          ${athlete.hidden&&html`<${Btn} onClick=${()=>{onUnhide(athlete.id);onClose();}} color="#66bb6a">Unhide<//>`}
          ${locked&&html`<${Badge} c="#66bb6a">🔒 Accepted "” Locked<//>`}

function getPerformanceReportBody(athlete) {

  return `Hello ${athlete.first},\n\n` +

         `--- PERFORMANCE METRICS ---\n` +
         `- Height: ${s1Val[0] || '"”'} in\n` +
         `- Reach: ${s1Val[1] || '"”'} in\n` +
         `- Vertical: ${s1Val[2] || '"”'} in\n` +
         `- Agility (Shuttle Run): ${s2Val[0] || '"”'} sec\n` +
         `- Coach Drill Score: ${athlete.drillScore || '"”'} / 10\n\n` +
         `Overall Tryout Score: ${sc || '"”'} / 10\n` +
         `Roster Status: ${athlete.status.toUpperCase()}\n\n` +

}

function EmailModal({athlete,team,onClose,onSend,initialType='offer'}){
  const [emailType, setEmailType] = useState(initialType);
  
  const offerTpl = useMemo(() => {
    return `Hello,\n\nWe are pleased to offer ${athlete?.first||''} ${athlete?.last||''} a roster spot on Mid TN VBC${team?' "” '+team:''} for the 2026-2027 season.\n\nDetails at www.midtnvbc.com/clubtryouts\n\nPlease reply:\n  1. Accept\n  2. Request a call\n  3. Decline\n\nThank you!\nMid TN VBC`;
  }, [athlete, team]);

  const reportTpl = useMemo(() => {
    if (!athlete) return '';
    return getPerformanceReportBody(athlete);
  }, [athlete]);

  const [body,setBody]=useState(offerTpl);

  useEffect(() => {
    setBody(emailType === 'offer' ? offerTpl : reportTpl);
  }, [emailType, athlete?.id, offerTpl, reportTpl]);

  if(!athlete) return null;

  const emailConfig = (() => {
    try {
      return JSON.parse(localStorage.getItem('midtn_email_config') || '{}');
    } catch (e) {
      return {};
    }
  })();

  const deliveryMethod = emailConfig.method || 'mailto';

  return html`
    <div class="modal-overlay" onClick=${onClose}>
      <div class="modal-box" style=${{width:560}} onClick=${e=>e.stopPropagation()}>
        <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <h3 style=${{margin:0,fontSize:16}}>Compose Email "” ${athlete.first} ${athlete.last}</h3>
          <button onClick=${onClose} style=${{background:'none',border:'none',color:'#666',fontSize:24,cursor:'pointer'}}>×</button>
        </div>
        
        <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
          <div>
            <label class="label">Email Template</label>
            <select class="select" value=${emailType} onChange=${e=>setEmailType(e.target.value)}>
              <option value="offer">Roster Offer Letter</option>
              <option value="report">Tryout Performance Report</option>
            </select>
          </div>
          <div>
            <label class="label">Sending Via</label>
            <div style=${{padding:'6px 10px',background:'#12151c',borderRadius:6,border:'1px solid #2a2e38',fontSize:12,color:'#66bb6a',fontWeight:700}}>
              ${deliveryMethod === 'mailto' ? '📧 Local Mail Client (mailto:)' : '🌐 Web API Service'}
            </div>
          </div>
        </div>

        ${team && emailType === 'offer' && html`<p style=${{margin:'0 0 6px',fontSize:12,color:'#f0a500',fontWeight:600}}>Roster Spot: ${team}</p>`}
        <p style=${{margin:'0 0 14px',fontSize:12,color:'#78909c'}}>${athlete.email||'âš ️ No email on file'}</p>
        <textarea class="input" rows="12" style=${{lineHeight:1.6,resize:'vertical',height:'auto',marginBottom:14,fontFamily:'monospace',fontSize:12}}
          value=${body} onInput=${e=>setBody(e.target.value)}></textarea>
        <div style=${{display:'flex',gap:8}}>
          <${Btn} onClick=${onClose} color="#2a2e38">Cancel<//>
          <${Btn} onClick=${()=>navigator.clipboard?.writeText(body)} color="#ffa726" outline>Copy Text<//>
          <${Btn} onClick=${()=>{onSend(athlete,body,team,emailType);onClose();}} color="#66bb6a" style=${{flex:1}}>
            ${athlete.email ? (deliveryMethod === 'mailto' ? 'Open Mail App ✓' : 'Send via Web API ✓') : 'Copy & Mark Contacted'}
          <//>
        </div>
      </div>
    </div>`;
}

function HideModal({athlete,onClose,onHide}){
  const [reason,setReason]=useState(HIDE_REASONS[0]);
  const [note,setNote]=useState('');
  if(!athlete) return null;
  return html`
    <div class="modal-overlay" onClick=${onClose}>
      <div class="modal-box" style=${{width:400}} onClick=${e=>e.stopPropagation()}>
        <h3 style=${{color:'#ef5350',margin:'0 0 16px'}}>Hide ${athlete.first} ${athlete.last}</h3>
        <div style=${{marginBottom:12}}><label class="label">Reason</label>
          <select class="select" value=${reason} onChange=${e=>setReason(e.target.value)}>
            ${HIDE_REASONS.map(r=>html`<option>${r}</option>`)}</select></div>
        <div style=${{marginBottom:20}}><label class="label">Notes (optional)</label>
          <input class="input" value=${note} onInput=${e=>setNote(e.target.value)} placeholder="Additional context..."/></div>
        <div style=${{display:'flex',gap:8}}>
          <${Btn} onClick=${onClose} color="#2a2e38" style=${{flex:1}}>Cancel<//>
          <${Btn} onClick=${()=>{onHide(athlete.id,reason,note);onClose();}} danger style=${{flex:1}}>Hide Athlete<//>
        </div>
      </div>
    </div>`;
}

// â”€â”€ PLAYER CARD â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function PCard({athlete,onClick,compact,showScore,teamKey}){
  const sc=totalScore(athlete.metrics, athlete.drillScore);
  const locked=athlete.teamLocked||athlete.status==='accepted';
  return html`
    <div class=${'player-card'+(athlete.status==='declined'?' declined':'')+(locked?' locked':'')}
      draggable=${!locked} onDragStart=${e=>!locked&&e.dataTransfer.setData('text/plain',athlete.id)}
      onClick=${()=>onClick?.(athlete)}>
      ${locked&&html`<span title="Locked" style=${{fontSize:10,fontWeight:800,color:'#f0a500'}}>🔒</span>`}
      <span style=${{fontFamily:'monospace',fontSize:10,color:'#4fc3f7',minWidth:22}}>#${athlete.to}</span>
      <span style=${{fontWeight:600,fontSize:compact?12:13,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>${athlete.first} ${athlete.last}</span>
      <${Badge} c="#78909c" sm>${posAbbr(athlete.primaryPos)}<//>
      ${athlete.altPos&&athlete.altPos!==athlete.primaryPos&&html`<${Badge} c="#3a3f47" sm>${posAbbr(athlete.altPos)}<//>`}
      ${athlete.wontAccept&&html`<span title=${'WON\'T ACCEPT / RESTRICTION: '+athlete.wontAccept} style=${{fontSize:16,cursor:'help',filter:'drop-shadow(0 0 2px #ffa726)'}}>âš ️</span>`}
      ${athlete.notes&&html`<span title=${'TRYOUT NOTES: '+athlete.notes} style=${{fontSize:16,cursor:'help',filter:'drop-shadow(0 0 2px #4fc3f7)'}}>📝</span>`}
      ${showScore&&sc&&html`<${Badge} c=${scoreColor(sc)} sm>${sc}<//>`}
      <${SBadge} status=${athlete.status}/>
    </div>`;
}

// â”€â”€ HEAD COACH â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function HeadCoach({athletes,setAthletes,onLogout}){
  const [view,setView]=useState('allreg');
  const [age,setAge]=useState('12');
  const [selAth,setSelAth]=useState(null);
  const [emailAth,setEmailAth]=useState(null);
  const [emailTeam,setEmailTeam]=useState('');
  const [hideAth,setHideAth]=useState(null);
  const [teamOfferKey,setTeamOfferKey]=useState(null);
  const [confirmCheckInAth,setConfirmCheckInAth]=useState(null);
  const [widePool,setWidePool]=useState(false);
  const [adminUnlocked,setAdminUnlocked]=useState(false);
  const [adminPinInput,setAdminPinInput]=useState('');

  // -- ADMIN & CONFIG STATE -
  const [emailConfig, setEmailConfig] = useState(() => {
    try {
      return JSON.parse(localStorage.getItem('midtn_email_config') || '{"method":"mailto"}');
    } catch (e) {
      return { method: 'mailto' };
    }
  });
  const [emailLogs, setEmailLogs] = useState(() => {
    try {
      return JSON.parse(localStorage.getItem('midtn_email_logs') || '[]');
    } catch (e) {
      return [];
    }
  });
  const [linkedFolders, setLinkedFolders] = useState(() => {
    try {
      return JSON.parse(localStorage.getItem('midtn_linked_folders') || '[]');
    } catch (e) {
      return [];
    }
  });
  const [unansweredQ, setUnansweredQ] = useState(() => {
    try {
      return JSON.parse(localStorage.getItem('midtn_unanswered_questions') || '[]');
    } catch (e) {
      return [];
    }
  });
  const [chatbotSettings, setChatbotSettings] = useState(() => {
    try {
      return JSON.parse(localStorage.getItem('midtn_chatbot_settings') || '{"provider":"rag","apiKey":"","modelName":""}');
    } catch (e) {
      return { provider: 'rag', apiKey: '', modelName: '' };
    }
  });
  const [kb, setKb] = useState(null);

  const saveChatbotSettings = (settings) => {
    setChatbotSettings(settings);
    localStorage.setItem('midtn_chatbot_settings', JSON.stringify(settings));
    window.dispatchEvent(new StorageEvent('storage', { key: 'midtn_chatbot_settings', newValue: JSON.stringify(settings) }));
  };

  useEffect(() => {
    // Load knowledge base
    const override = localStorage.getItem('midtn_kb_override');
    if (override) {
      setKb(JSON.parse(override));
    } else {
      fetch('../volley_kb.json')
        .then(res => res.json())
        .then(data => {
          setKb(data);
          localStorage.setItem('midtn_kb_override', JSON.stringify(data));
        })
        .catch(err => console.error('Error loading static KB:', err));
    }

    // Listen for cross-tab updates
    const syncLogs = (e) => {
      if (e.key === 'midtn_email_logs') {
        try { setEmailLogs(JSON.parse(e.newValue || '[]')); } catch (err) {}
      }
      if (e.key === 'midtn_unanswered_questions') {
        try { setUnansweredQ(JSON.parse(e.newValue || '[]')); } catch (err) {}
      }
      if (e.key === 'midtn_chatbot_settings') {
        try { setChatbotSettings(JSON.parse(e.newValue || '{"provider":"rag","apiKey":"","modelName":""}')); } catch (err) {}
      }
      if (e.key === 'midtn_kb_override') {
        try { setKb(JSON.parse(e.newValue)); } catch (err) {}
      }
    };
    window.addEventListener('storage', syncLogs);
    return () => window.removeEventListener('storage', syncLogs);
  }, []);

  const saveKb = (newKb) => {
    setKb(newKb);
    localStorage.setItem('midtn_kb_override', JSON.stringify(newKb));
    window.dispatchEvent(new StorageEvent('storage', { key: 'midtn_kb_override', newValue: JSON.stringify(newKb) }));
  };

  const saveEmailConfig = (config) => {
    setEmailConfig(config);
    localStorage.setItem('midtn_email_config', JSON.stringify(config));
  };

  const saveLinkedFolders = (folders) => {
    setLinkedFolders(folders);
    localStorage.setItem('midtn_linked_folders', JSON.stringify(folders));
  };

  const upd=useCallback((id,updates)=>{
    setAthletes(p=>p.map(a=>{
      if(a.id!==id) return a;
      let next={...a,...updates};
      if(updates.primaryPos || updates.altPos) {
        next.posCategory = classifyPos(next.primaryPos);
        next.posCategories = getAthleteCategories(next);
      }
      if(updates.status==='accepted') next.teamLocked=true;
      else if(updates.status && a.status==='accepted') next.teamLocked=false;
      return next;
    }));
    setSelAth(p=>{
      if(p?.id!==id) return p;
      let next={...p,...updates};
      if(updates.primaryPos || updates.altPos) {
        next.posCategory = classifyPos(next.primaryPos);
        next.posCategories = getAthleteCategories(next);
      }
      if(updates.status==='accepted') next.teamLocked=true;
      else if(updates.status && p.status==='accepted') next.teamLocked=false;
      return next;
    });
  },[]);
  const updMetric=useCallback((id,key,vals)=>{
    setAthletes(p=>p.map(a=>a.id===id?{...a,metrics:{...a.metrics,[key]:vals}}:a));
    setSelAth(p=>p?.id===id?{...p,metrics:{...p.metrics,[key]:vals}}:p);
  },[]);
  const addWalkup=useCallback(wu=>{setAthletes(p=>[...p,...initAthletes([wu])]);},[]);
  const doHide=(id,reason,note)=>upd(id,{hidden:true,hideReason:reason,hideNote:note,teamAssignment:null,teamLocked:false});
  const doUnhide=id=>upd(id,{hidden:false,hideReason:'',hideNote:''});
  const doArrive=athlete=>setConfirmCheckInAth(athlete);
  const handleConfirmArrive=(id,contactInfo)=>{
    upd(id,{...contactInfo,arrived:true,status:'arrived'});
    setConfirmCheckInAth(null);
  };
  
  const doEmail=(athlete,body,team,type)=>{
    upd(athlete.id,{status:['pending','arrived'].includes(athlete.status)?'contacted':athlete.status});
    const subject = type === 'offer' ? `Mid TN VBC - Offer` + (team ? ` - ${team}` : ``) : `Mid TN VBC Tryout Performance Report`;

    if (emailConfig.method === 'mailto') {
      if(athlete.email) window.open(`mailto:${athlete.email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`,'_blank');
      else navigator.clipboard?.writeText(body);
      
      logEmail(athlete.first + ' ' + athlete.last, athlete.email || 'N/A', type || 'offer', 'Copied/Opened Mailto', body);
      setEmailLogs(JSON.parse(localStorage.getItem('midtn_email_logs') || '[]'));
    } else {
      // Send API email
      const endpoint = emailConfig.api_endpoint || 'https://api.emailjs.com/api/v1.0/email/send';
      let payload = {};
      
      if (endpoint.includes('emailjs.com')) {
        payload = {
          service_id: emailConfig.emailjs_service,
          template_id: emailConfig.emailjs_template,
          user_id: emailConfig.emailjs_public_key,
          template_params: {
            to_email: athlete.email,
            to_name: `${athlete.first} ${athlete.last}`,
            message: body,
            subject: subject
          }
        };
      } else {
        payload = {
          to: athlete.email,
          name: `${athlete.first} ${athlete.last}`,
          subject: subject,
          body: body
        };
      }

      fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
      .then(res => {
        if (res.ok) {
          logEmail(athlete.first + ' ' + athlete.last, athlete.email, type || 'offer', 'Sent (API)', body);
          alert(`Email successfully sent via API to ${athlete.email}!`);
        } else {
          res.text().then(errText => {
            logEmail(athlete.first + ' ' + athlete.last, athlete.email, type || 'offer', `Failed: ${res.status}`, body);
            alert(`Failed to send email via API: ${res.status} - ${errText}`);
          });
        }
        setEmailLogs(JSON.parse(localStorage.getItem('midtn_email_logs') || '[]'));
      })
      .catch(err => {
        logEmail(athlete.first + ' ' + athlete.last, athlete.email, type || 'offer', 'Failed (Network Error)', body);
        alert(`Network error sending email: ${err.message}`);
        setEmailLogs(JSON.parse(localStorage.getItem('midtn_email_logs') || '[]'));
      });
    }
  };

  const exportToCSV=()=>{
    const headers=['TO#','First','Last','Age','Primary','Alt','Coach','Status','Team','Score','Drill','Height','Reach','Vertical','Shuttle','Arrived','Notes','WontAccept','Phone','Email'];
    const data=athletes.filter(a=>!a.hidden).map(a=>[
      a.to,a.first,a.last,a.ageGroup+'s',a.primaryPos,a.altPos,a.coachPos,a.status,a.teamAssignment||'',totalScore(a.metrics, a.drillScore)||'',
      a.drillScore||'',(a.metrics?.s1?.[0]||''),(a.metrics?.s1?.[1]||''),(a.metrics?.s1?.[2]||''),(a.metrics?.s2?.[0]||''),
      a.arrived?'YES':'NO',a.notes,a.wontAccept,a.phone,a.email
    ]);
    exportCSV([headers,...data], `midtn_tryouts_export_${new Date().toISOString().slice(0,10)}.csv`);
  };

  const regList=useMemo(()=>{
    let l=athletes.filter(a=>!a.hidden);
    if(regQ){const s=regQ.toLowerCase();l=l.filter(a=>a.first.toLowerCase().includes(s)||a.last.toLowerCase().includes(s)||a.to.includes(regQ)||(a.division||'').toLowerCase().includes(s)||(a.primaryPos||'').toLowerCase().includes(s));}
    return l;
  },[athletes,regQ]);
  const submitWu=()=>{
    const isWuValid = wuForm.first.trim() && wuForm.last.trim() && (wuForm.phone||'').trim().length >= 7 && (wuForm.email||'').trim().includes('@');
    if(!isWuValid) return;
    addWalkup({...wuForm,id:`wu-${Date.now()}`,to:String(200+athletes.filter(a=>a.isWalkup).length),isWalkup:true,arrived:true,status:'arrived'});
    setWuForm({first:'',last:'',dob:'',division:'12 & Under',primaryPos:'Outside Hitter',altPos:'',phone:'',email:''});
    setAddWu(false);
  };

  // â”€â”€ DEPTH â”€â”€
  const depthPool=useMemo(()=>{
    const pool=athletes.filter(a=>a.ageGroup===age&&!a.hidden);
    const g={setter:[],middle:[],outside:[],defense:[],unsorted:[]};
    pool.forEach(a=>{
      (a.posCategories || [a.posCategory || 'unsorted']).forEach(cat => {
        if(g[cat]) g[cat].push(a);
        else g.unsorted.push(a);
      });
    });
    Object.keys(g).forEach(k=>g[k].sort((a,b)=>(Number(totalScore(b.metrics, b.drillScore))||0)-(Number(totalScore(a.metrics, a.drillScore))||0)));
    return g;
  },[athletes,age]);

  // â”€â”€ RESULTS â”€â”€
  const [resSort,setResSort]=useState('score');

    const l=athletes.filter(a=>a.ageGroup===age&&!a.hidden);
    if(resSort==='score') l.sort((a,b)=>(Number(totalScore(b.metrics, b.drillScore))||0)-(Number(totalScore(a.metrics, a.drillScore))||0));
    else if(resSort==='name') l.sort((a,b)=>a.last.localeCompare(b.last));
    else l.sort((a,b)=>(sAvg(b.metrics,resSort)||0)-(sAvg(a.metrics,resSort)||0));
    return l;
  },[athletes,age,resSort]);

  // â”€â”€ TEAMS â”€â”€

      l.sort((a,b)=>(Number(totalScore(b.metrics, b.drillScore))||0)-(Number(totalScore(a.metrics, a.drillScore))||0));
    } else if(poolSort==='name') {
      l.sort((a,b)=>a.last.localeCompare(b.last));
    } else if(poolSort==='pos'){
      const order = {setter:1, middle:2, outside:3, defense:4, unsorted:5};
      l.sort((a,b)=>{
        if(a.posCategory !== b.posCategory) return (order[a.posCategory]||99) - (order[b.posCategory]||99);
        return (Number(totalScore(b.metrics, b.drillScore))||0)-(Number(totalScore(a.metrics, a.drillScore))||0);
      });
    }
    return l;
  },[ageAths,poolSort,showAllPool]);
  const drop=(e,teamKey)=>{
    e.preventDefault();
    const id=e.dataTransfer.getData('text/plain');
    const a=athletes.find(x=>x.id===id);
    const roster=athletes.filter(ath=>ath.teamAssignment===teamKey);
    const isLocked=roster.length>0&&roster.every(ath=>ath.teamLocked);
    if(a&&!a.teamLocked&&a.status!=='accepted'&&!isLocked) upd(id,{teamAssignment:teamKey});
    setDragOver(null);
  };

  const th={};
  const td={};

  return html`
    <div style=${{minHeight:'100vh',background:'#0d1017',paddingBottom:20}}>
      <div class="sticky-header no-print">
        <div style=${{display:'flex',gap:8,padding:'6px 0',borderBottom:'1px solid #1e222b',marginBottom:6}}>
          <span style=${{fontSize:11,color:'#546e7a',fontWeight:700,alignSelf:'center'}}>STATIONS:</span>
          <a href="${window.location.origin+window.location.pathname+'?pin='+CHECKIN_PIN}" target="_blank" style=${{padding:'4px 10px',background:'#26c6da22',color:'#26c6da',fontSize:11,fontWeight:700,borderRadius:4,border:'1px solid #26c6da44',textDecoration:'none'}}>📝 Check-In</a>
          <a href="${window.location.origin+window.location.pathname+'?pin='+STAFF_PIN}" target="_blank" style=${{padding:'4px 10px',background:'#42a5f522',color:'#42a5f5',fontSize:11,fontWeight:700,borderRadius:4,border:'1px solid #42a5f544',textDecoration:'none'}}>📏 Physical</a>
          <a href="${window.location.origin+window.location.pathname+'?pin='+STATION2_PIN}" target="_blank" style=${{padding:'4px 10px',background:'#ffa72622',color:'#ffa726',fontSize:11,fontWeight:700,borderRadius:4,border:'1px solid #ffa72644',textDecoration:'none'}}>⏱ Agility</a>
        </div>
        <div style=${{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap',marginBottom:10}}>

function TeamOfferModal({teamKey,athletes,onClose,onSendOffer}){

  const roster=athletes.filter(a=>a.teamAssignment===teamKey);

  return html`
    <div class="modal-overlay" onClick=${onClose}>

        <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <h3 style=${{margin:0}}>${age} ${lvl} — Send Offers</h3>
          <button onClick=${onClose} style=${{background:'none',border:'none',color:'#666',fontSize:24,cursor:'pointer'}}>×</button>
        </div>
        <div style=${{maxHeight:400,overflowY:'auto',marginBottom:16}}>
          ${roster.map(a=>html`
            <div key=${a.id} style=${{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:'1px solid #2a2e38'}}>
              <div style=${{flex:1}}>
                <div style=${{fontWeight:700}}>${a.first} ${a.last}</div>
                <div style=${{fontSize:11,color:'#78909c'}}>${posAbbr(a.primaryPos)} · ${a.status}</div>
              </div>
              ${['accepted','declined','offered'].includes(a.status)
                ? html`<${Badge} c=${a.status==='accepted'?'#66bb6a':a.status==='declined'?'#ef5350':'#42a5f5'} sm>${a.status}<//>`
                : html`<${Btn} sm onClick=${()=>onSendOffer(a)} color="#f0a500">Send Offer<//>`}
            </div>`)}
        </div>
        <${Btn} onClick=${onClose} style=${{width:'100%'}} color="#2a2e38">Done<//>
      </div>
    </div>`;

// â”€â”€ ROOT â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function App(){
  const [user,setUser]=useState(null);
  const [athletes,setAthletes]=useState(()=>{
    const l=loadLocal();
    return l?initAthletes(l):initAthletes(RAW);
  });

  const updMetric=useCallback((id,key,vals)=>{
    setAthletes(p=>p.map(a=>a.id===id?{...a,metrics:{...a.metrics,[key]:vals}}:a));
  },[]);
  const doArrive=useCallback((id,contactInfo)=>{setAthletes(p=>p.map(a=>a.id===id?{...a,...(contactInfo||{}),arrived:true,status:'arrived'}:a));},[]);
  const addWalkup=useCallback(wu=>{setAthletes(p=>[...p,...initAthletes([wu])]);},[]);
  
  useEffect(()=>{if(athletes.length) saveLocal(athletes);},[athletes]);

  // Real-time synchronization - local tabs + GitHub cross-machine
  useEffect(() => {
    // Local tab sync (same machine)
    const syncLocal = (e) => {
      if (e.key === LOCAL_KEY) {
        const next = loadLocal();
        if (next) setAthletes(initAthletes(next));
      }
    };
    window.addEventListener('storage', syncLocal);

    // GitHub poll (cross-machine)
    let pollTimer = null;
    const poll = async () => {
      if (_writeInProgress) return; // Don't poll while writing
      const remote = await ghRead();
      if (!remote || !remote.length) return;
      const remoteHash = hashAthletes(remote);
      if (remoteHash !== _lastRemoteHash) {
        _lastRemoteHash = remoteHash;
        setAthletes(prev => {
          const localMap = Object.fromEntries(prev.map(a => [a.id, a]));
          const remoteMap = Object.fromEntries(remote.map(a => [a.id, a]));
          const allIds = new Set([...Object.keys(localMap), ...Object.keys(remoteMap)]);
          return Array.from(allIds).map(id => {
            const loc = localMap[id];
            const rem = remoteMap[id];
            if (!loc) return rem;
            if (!rem) return loc;
            // Merge: local wins for arrived/metrics/drillScore/notes if set
            return {
              ...rem,
              arrived: loc.arrived || rem.arrived,
              status: (loc.arrived && !rem.arrived) ? 'arrived' : rem.status,
              metrics: {
                s1: (loc.metrics&&loc.metrics.s1&&loc.metrics.s1.some(v=>v)) ? loc.metrics.s1 : (rem.metrics&&rem.metrics.s1||[]),
                s2: (loc.metrics&&loc.metrics.s2&&loc.metrics.s2.some(v=>v)) ? loc.metrics.s2 : (rem.metrics&&rem.metrics.s2||[]),
              },
              drillScore: loc.drillScore || rem.drillScore,
              notes: loc.notes || rem.notes,
              teamAssignment: loc.teamAssignment || rem.teamAssignment,
            };
          });
        });
      }
    };

    {
      poll(); // immediate first poll
      pollTimer = setInterval(poll, GH_CONFIG.poll);
    }

    return () => {
      window.removeEventListener('storage', syncLocal);
      if (pollTimer) clearInterval(pollTimer);
    };
  }, []);

  const isWalkupMode = useMemo(() => {
    return new URLSearchParams(window.location.search).get('mode') === 'walkup';
  }, []);

  if (isWalkupMode) {
    return html`<${WalkupRegister} athletes=${athletes} onAddWalkup=${addWalkup} />`;
  }

  if(!user) return html`<${Login} onLogin=${setUser}/>`;
  if(user.role==='staff') return html`<${StaffDashboard} athletes=${athletes} setAthletes=${setAthletes} onArrive=${doArrive} onAddWalkup=${addWalkup} onMetric=${updMetric} onLogout=${()=>setUser(null)} initialTab=${user.tab}/>`;
  return html`<${HeadCoach} athletes=${athletes} setAthletes=${setAthletes} onLogout=${()=>setUser(null)}/>`;
}
render(html`<${App}/>`,document.getElementById('app'));
</script>
