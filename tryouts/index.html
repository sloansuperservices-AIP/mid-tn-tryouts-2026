function posAbbr(p){
  if(!p) return '---'; const s=p.toLowerCase();
  if(s.includes('setter')||s==='s') return 'S';
  if(s.includes('middle')||s==='mb') return 'M';
  if(s.includes('outside')||s==='oh') return 'OH';
  if(s.includes('right side')||s==='rs') return 'RS';
  if(s.includes('defensive')||s==='ds') return 'DS';
  if(s.includes('libero')||s==='l') return 'L';
  if(s.includes('unsure')) return '?';
  return p.substring(0,3).toUpperCase();
}
function classifyPos(p){
  if(!p) return 'unsorted'; const s=p.toLowerCase();
  for(const c of POS_CATS) {
    if(c.abbrs.some(a => a.length <= 2 ? s === a : s.includes(a))) return c.key;
  }
  return 'unsorted';
}
function getPosCategories(p1, p2) {
  const res = new Set();
  [p1, p2].forEach(p => {
    if (!p || p === 'N/A') return;
    if(!p || p === 'N/A' || p === 'none') return;
    const s = p.toLowerCase();
    for (const c of POS_CATS) {
      if (c.abbrs.some(a => a.length <= 2 ? s === a : s.includes(a))) res.add(c.key);
    }
  });
  return res.size ? Array.from(res) : ['unsorted'];
}
function getAthleteCategories(a) {
  const cats = new Set();
  cats.add(classifyPos(a.primaryPos));
  if (a.altPos && a.altPos !== 'N/A' && a.altPos !== 'none') cats.add(classifyPos(a.altPos));
  return Array.from(cats);
}
function divAge(d){const m=(d||'').match(/(\d+)/);return m?m[1]:'';}
function sAvg(metrics, key) {
  // Use a single loop to avoid multiple iterations and intermediate array allocations
  const values = (metrics || {})[key];
  if (!values || !values.length) return null;
  let sum = 0, count = 0;
  for (let i = 0, len = values.length; i < len; i++) {
    const val = values[i];
    if (val !== '' && val !== null) {
      const num = Number(val);
      if (!isNaN(num)) {
        sum += num;
        count++;
      }
    }
  }
  return count > 0 ? sum / count : null;
}
function totalScore(metrics, drillScore){
  let s=0,c=0;
  STATIONS.filter(st=>st.key!=='checkin').forEach(st=>{
    const a=sAvg(metrics,st.key);
    if(a!==null){s+=a;c++;}
  });
  if(drillScore && !isNaN(Number(drillScore))){
    s += Number(drillScore);
    c++;
  }
  return c>0?(s/c).toFixed(1):null;
}

function Stopwatch({ onApply, label="Stopwatch" }) {
  const [time, setTime] = useState(0);
  const [running, setRunning] = useState(false);
  const startRef = useRef(0);
  const animRef = useRef(0);

  const tick = useCallback(() => {
    setTime(Date.now() - startRef.current);
    animRef.current = requestAnimationFrame(tick);
  }, []);

  const handleStart = () => {
    if (running) {
      cancelAnimationFrame(animRef.current);
      setRunning(false);
    } else {
      startRef.current = Date.now() - time;
      setRunning(true);
      animRef.current = requestAnimationFrame(tick);
    }
  };

  const handleReset = () => {
    cancelAnimationFrame(animRef.current);
    setRunning(false);
    setTime(0);
  };

  useEffect(() => {
    return () => cancelAnimationFrame(animRef.current);
  }, []);

  const formatTime = (ms) => {
    const min = Math.floor(ms / 60000);
    const sec = Math.floor((ms % 60000) / 1000);
    const hundredths = Math.floor((ms % 1000) / 10);
    return `${min > 0 ? min + ':' : ''}${sec.toString().padStart(2, '0')}.${hundredths.toString().padStart(2, '0')}`;
  };

  const seconds = (time / 1000).toFixed(2);

  return html`
    <div style=${{ background: '#12151c', border: '1px solid #2a2e38', borderRadius: '10px', padding: '12px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '8px', marginTop: '10px', marginBottom: '10px' }}>

      <div style=${{ fontFamily: 'monospace', fontSize: '28px', fontWeight: 800, color: '#f0a500', letterSpacing: '1px' }}>${formatTime(time)}</div>
      <div style=${{ display: 'flex', gap: '6px', width: '100%' }}>
        <button class="btn btn-sm" onClick=${handleStart} style=${{ flex: 1, background: running ? '#ef5350' : '#66bb6a', color: '#fff' }}>
          ${running ? 'Pause' : 'Start'}
        </button>
        <button class="btn btn-sm btn-outline" onClick=${handleReset} style=${{ flex: 1, borderColor: '#78909c', color: '#78909c' }}>
          Reset
        </button>
        ${onApply && html`
          <button class="btn btn-sm" onClick=${() => onApply(seconds)} style=${{ flex: 1.2, background: '#4fc3f7', color: '#000', fontWeight: 700 }}>
            Apply (${seconds}s)
          </button>
        `}
      </div>
    </div>
  `;
}

function StaffDashboard({athletes, setAthletes, onArrive, onAddWalkup, onMetric, onLogout, initialTab}) {
  const [activeTab, setActiveTab] = useState(initialTab || 'checkin'); // 'checkin', 's1', 's2'
  const [globalSearch, setGlobalSearch] = useState('');
  const [selAth, setSelAth] = useState(null);

  // Active athlete selected in inputs (s1, s2, drills)
  const [activeAthlete, setActiveAthlete] = useState(null);
  const [s1Vals, setS1Vals] = useState(['', '', '']);
  const [s2Val, setS2Val] = useState('');
  const [drillVal, setDrillVal] = useState('');

  // Sign In Pane States
  const [checkinQ, setCheckinQ] = useState('');
  const [showWalkup, setShowWalkup] = useState(false);
  const [walkupForm, setWalkupForm] = useState({first:'', last:'', dob:'', division:'12 & Under', primaryPos:'Outside Hitter', altPos:'N/A', phone:'', email:''});
  const [recentCheckins, setRecentCheckins] = useState([]);
  const [confirmCheckInAth, setConfirmCheckInAth] = useState(null);

  const handleConfirmCheckIn = (id, contactInfo) => {
    onArrive(id, contactInfo);
    const matched = athletes.find(a=>a.id===id);
    setRecentCheckins(p=>[matched,...p].filter(Boolean).map(a=>a.id===id?{...a,...contactInfo}:a).slice(0,6));
    setConfirmCheckInAth(null);
    setCheckinQ('');
    setGlobalSearch('');
  };

  // Station lists: all registered athletes, sorted by arrived desc, then first name
  const allAthletesSorted = useMemo(() => {
    return [...athletes].filter(a => !a.hidden).sort((a, b) => {
      if (a.arrived !== b.arrived) return a.arrived ? 1 : -1;
      return a.first.localeCompare(b.first);
    });
  }, [athletes]);

  // Global search filtering
  const lookupResults = useMemo(() => {
    const q = globalSearch.trim().toLowerCase();
    if (!q) return [];
    return athletes.filter(a => !a.hidden && (
      a.first.toLowerCase().includes(q) || 
      a.last.toLowerCase().includes(q) || 
      a.to.includes(q)
    ));
  }, [globalSearch, athletes]);

  // Handle loading athlete in station
  const loadAthleteForTab = (ath, tab = activeTab) => {
    setActiveAthlete(ath);
    setGlobalSearch('');
    if (tab === 's1') {
      const v = ath.metrics?.s1 || ['', '', ''];
      setS1Vals([v[0] || '', v[1] || '', v[2] || '']);
    } else if (tab === 's2') {
      const v = ath.metrics?.s2 || [''];
      setS2Val(v[0] || '');
    } else if (tab === 'drills') {
      setDrillVal(ath.drillScore || '');
    }
  };

  const getCompletion = (ath) => {
    const s1 = ath.metrics?.s1 || [];
    const s1Done = s1.filter(x => x !== '' && x !== null && !isNaN(Number(x))).length === 3;
    const s2 = ath.metrics?.s2 || [];
    const s2Done = s2.length > 0 && s2[0] !== '' && s2[0] !== null;
    const drillDone = ath.drillScore !== '' && ath.drillScore !== null && !isNaN(Number(ath.drillScore));
    return {
      checkin: ath.arrived,
      s1: s1Done,
      s2: s2Done,
      drills: drillDone
    };
  };

  const handleSaveS1 = () => {
    if (!activeAthlete) return;
    onMetric(activeAthlete.id, 's1', s1Vals);
    setActiveAthlete(null);
    setS1Vals(['', '', '']);
    alert('Physical metrics saved successfully!');
  };

  const handleSaveS2 = () => {
    if (!activeAthlete) return;
    onMetric(activeAthlete.id, 's2', [s2Val]);
    setActiveAthlete(null);
    setS2Val('');
    alert('Agility metric saved successfully!');
  };

  const handleSaveDrill = () => {
    if (!activeAthlete) return;
    setAthletes(prev => prev.map(a => a.id === activeAthlete.id ? { ...a, drillScore: drillVal } : a));
    setActiveAthlete(null);
    setDrillVal('');
    alert('Drill score saved successfully!');
  };

  const handleGlobalAction = (ath, targetTab) => {
    setActiveTab(targetTab);
    loadAthleteForTab(ath, targetTab);
  };

  useEffect(() => {
    if (activeAthlete) {
      const updated = athletes.find(a => a.id === activeAthlete.id);
      if (updated) {
        setActiveAthlete(updated);
      }
    }
  }, [athletes]);

  return html`

          <div>Total Registered: <strong>${athletes.filter(a=>!a.hidden).length}</strong></div>

        <${Btn} sm onClick=${onLogout} color="#ef5350" outline>Log Out<//>

function AthleteModal({athlete,onClose,onChange,onHide,onUnhide,onEmail}){

  const sc = totalScore(athlete.metrics, athlete.drillScore);
  const [ef,setEf]=useState(null);
  const [ev,setEv]=useState('');
  const [showStopwatch, setShowStopwatch] = useState(false);

  const startEdit=(k,v)=>{if(locked)return;setEf(k);setEv(v||'');};
  const saveEdit=()=>{if(ef){onChange(athlete.id,{[ef]:ev});setEf(null);}};
  const F=(label,key,opts)=>html`
    <div>
      <div class="label">${label}</div>
      ${ef===key?(opts
        ?html`<select class="select" value=${ev} onChange=${e=>setEv(e.target.value)} onBlur=${saveEdit} autoFocus>${opts.map(o=>html`<option>${o}</option>`)}</select>`
        :html`<input class="input" value=${ev} onInput=${e=>setEv(e.target.value)} onBlur=${saveEdit} onKeyDown=${e=>e.key==='Enter'&&saveEdit()} autoFocus style=${{fontSize:13,padding:'6px 8px'}}/>`)
      :html`<div onClick=${()=>startEdit(key,athlete[key])} style=${{fontSize:13,color:athlete[key]?'#e8eaed':'#444',cursor:locked?'default':'pointer',padding:'2px 0',borderBottom:'1px dashed #2a2e38',wordBreak:'break-all',minHeight:20}}>
        ${athlete[key]||'â€”'}${!locked&&html`<span style=${{color:'#4fc3f7',marginLeft:4,fontSize:10}}>âœ</span>`}
      </div>`}
    </div>`;

function HeadCoach({athletes,setAthletes,onLogout}){
  const [view,setView]=useState('allreg');
  const [age,setAge]=useState('12');
  const [selAth,setSelAth]=useState(null);
  const [emailAth,setEmailAth]=useState(null);
  const [emailTeam,setEmailTeam]=useState('');
  const [hideAth,setHideAth]=useState(null);
  const [teamOfferKey,setTeamOfferKey]=useState(null);
  const [confirmCheckInAth,setConfirmCheckInAth]=useState(null);
  const [widePool,setWidePool]=useState(false);

  // ── ADMIN & CONFIG STATE ──────────────────────────────────────
  const [emailConfig, setEmailConfig] = useState(() => {
    try {
      return JSON.parse(localStorage.getItem('midtn_email_config') || '{"method":"mailto"}');
    } catch (e) {
      return { method: 'mailto' };
    }
  });
  const [emailLogs, setEmailLogs] = useState(() => {
    try {
      return JSON.parse(localStorage.getItem('midtn_email_logs') || '[]');
    } catch (e) {
      return [];
    }
  });
  const [linkedFolders, setLinkedFolders] = useState(() => {
    try {
      return JSON.parse(localStorage.getItem('midtn_linked_folders') || '[]');
    } catch (e) {
      return [];
    }
  });
  const [unansweredQ, setUnansweredQ] = useState(() => {
    try {
      return JSON.parse(localStorage.getItem('midtn_unanswered_questions') || '[]');
    } catch (e) {
      return [];
    }
  });
  const [chatbotSettings, setChatbotSettings] = useState(() => {
    try {
      return JSON.parse(localStorage.getItem('midtn_chatbot_settings') || '{"provider":"rag","apiKey":"","modelName":""}');
    } catch (e) {
      return { provider: 'rag', apiKey: '', modelName: '' };
    }
  });
  const [kb, setKb] = useState(null);

  const saveChatbotSettings = (settings) => {
    setChatbotSettings(settings);
    localStorage.setItem('midtn_chatbot_settings', JSON.stringify(settings));
    window.dispatchEvent(new StorageEvent('storage', { key: 'midtn_chatbot_settings', newValue: JSON.stringify(settings) }));
  };

  useEffect(() => {
    // Load knowledge base
    const override = localStorage.getItem('midtn_kb_override');
    if (override) {
      setKb(JSON.parse(override));
    } else {
      fetch('../volley_kb.json')
        .then(res => res.json())
        .then(data => {
          setKb(data);
          localStorage.setItem('midtn_kb_override', JSON.stringify(data));
        })
        .catch(err => console.error('Error loading static KB:', err));
    }

    // Listen for cross-tab updates
    const syncLogs = (e) => {
      if (e.key === 'midtn_email_logs') {
        try { setEmailLogs(JSON.parse(e.newValue || '[]')); } catch (err) {}
      }
      if (e.key === 'midtn_unanswered_questions') {
        try { setUnansweredQ(JSON.parse(e.newValue || '[]')); } catch (err) {}
      }
      if (e.key === 'midtn_chatbot_settings') {
        try { setChatbotSettings(JSON.parse(e.newValue || '{"provider":"rag","apiKey":"","modelName":""}')); } catch (err) {}
      }
      if (e.key === 'midtn_kb_override') {
        try { setKb(JSON.parse(e.newValue)); } catch (err) {}
      }
    };
    window.addEventListener('storage', syncLogs);
    return () => window.removeEventListener('storage', syncLogs);
  }, []);

  const saveKb = (newKb) => {
    setKb(newKb);
    localStorage.setItem('midtn_kb_override', JSON.stringify(newKb));
    window.dispatchEvent(new StorageEvent('storage', { key: 'midtn_kb_override', newValue: JSON.stringify(newKb) }));
  };

  const saveEmailConfig = (config) => {
    setEmailConfig(config);
    localStorage.setItem('midtn_email_config', JSON.stringify(config));
  };

  const saveLinkedFolders = (folders) => {
    setLinkedFolders(folders);
    localStorage.setItem('midtn_linked_folders', JSON.stringify(folders));
  };

  const upd=useCallback((id,updates)=>{
    setAthletes(p=>p.map(a=>{
      if(a.id!==id) return a;
      let next={...a,...updates};
      if(updates.primaryPos || updates.altPos) {
        next.posCategory = classifyPos(next.primaryPos);
        next.posCategories = getAthleteCategories(next);
      }
      if(updates.status==='accepted') next.teamLocked=true;
      else if(updates.status && a.status==='accepted') next.teamLocked=false;
      return next;
    }));
    setSelAth(p=>{
      if(p?.id!==id) return p;
      let next={...p,...updates};
      if(updates.primaryPos || updates.altPos) {
        next.posCategory = classifyPos(next.primaryPos);
        next.posCategories = getAthleteCategories(next);
      }
      if(updates.status==='accepted') next.teamLocked=true;
      else if(updates.status && p.status==='accepted') next.teamLocked=false;
      return next;
    });
  },[]);
  const updMetric=useCallback((id,key,vals)=>{
    setAthletes(p=>p.map(a=>a.id===id?{...a,metrics:{...a.metrics,[key]:vals}}:a));
    setSelAth(p=>p?.id===id?{...p,metrics:{...p.metrics,[key]:vals}}:p);
  },[]);
  const addWalkup=useCallback(wu=>{setAthletes(p=>[...p,...initAthletes([wu])]);},[]);
  const doHide=(id,reason,note)=>upd(id,{hidden:true,hideReason:reason,hideNote:note,teamAssignment:null,teamLocked:false});
  const doUnhide=id=>upd(id,{hidden:false,hideReason:'',hideNote:''});
  const doArrive=athlete=>setConfirmCheckInAth(athlete);
  const handleConfirmArrive=(id,contactInfo)=>{
    upd(id,{...contactInfo,arrived:true,status:'arrived'});
    setConfirmCheckInAth(null);
  };
  
  const doEmail=(athlete,body,team,type)=>{
    upd(athlete.id,{status:['pending','arrived'].includes(athlete.status)?'contacted':athlete.status});
    const subject = type === 'offer' ? `Mid TN VBC - Offer` + (team ? ` - ${team}` : ``) : `Mid TN VBC Tryout Performance Report`;

    if (emailConfig.method === 'mailto') {
      if(athlete.email) window.open(`mailto:${athlete.email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`,'_blank');
      else navigator.clipboard?.writeText(body);
      
      logEmail(athlete.first + ' ' + athlete.last, athlete.email || 'N/A', type || 'offer', 'Copied/Opened Mailto', body);
      setEmailLogs(JSON.parse(localStorage.getItem('midtn_email_logs') || '[]'));
    } else {
      // Send API email
      const endpoint = emailConfig.api_endpoint || 'https://api.emailjs.com/api/v1.0/email/send';
      let payload = {};
      
      if (endpoint.includes('emailjs.com')) {
        payload = {
          service_id: emailConfig.emailjs_service,
          template_id: emailConfig.emailjs_template,
          user_id: emailConfig.emailjs_public_key,
          template_params: {
            to_email: athlete.email,
            to_name: `${athlete.first} ${athlete.last}`,
            message: body,
            subject: subject
          }
        };
      } else {
        payload = {
          to: athlete.email,
          name: `${athlete.first} ${athlete.last}`,
          subject: subject,
          body: body
        };
      }

      fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
      .then(res => {
        if (res.ok) {
          logEmail(athlete.first + ' ' + athlete.last, athlete.email, type || 'offer', 'Sent (API)', body);
          alert(`Email successfully sent via API to ${athlete.email}!`);
        } else {
          res.text().then(errText => {
            logEmail(athlete.first + ' ' + athlete.last, athlete.email, type || 'offer', `Failed: ${res.status}`, body);
            alert(`Failed to send email via API: ${res.status} - ${errText}`);
          });
        }
        setEmailLogs(JSON.parse(localStorage.getItem('midtn_email_logs') || '[]'));
      })
      .catch(err => {
        logEmail(athlete.first + ' ' + athlete.last, athlete.email, type || 'offer', 'Failed (Network Error)', body);

        setEmailLogs(JSON.parse(localStorage.getItem('midtn_email_logs') || '[]'));
      });
    }

                            const next = unansweredQ.map(item=>item.id===q.id?{...item,answer:e.target.value}:item);
                            setUnansweredQ(next);
                            localStorage.setItem('midtn_unanswered_questions', JSON.stringify(next));
                          }} style=${{fontSize:11,padding:6}}></textarea>
                      </div>
                      
                      <div style=${{textAlign:'right'}}>
                        <${Btn} sm onClick=${()=>{
                          if(!q.answer || !q.answer.trim()) {
                            alert("Please enter an answer before training!");
                            return;
                          }
                          const currentKb = kb || { club_info: {}, news: [], rules_and_regulations: {}, faq: [], active_documents: [] };
                          const nextKb = {
                            ...currentKb,
                            faq: [...(currentKb.faq || []), { question: q.question, answer: q.answer.trim() }]
                          };
                          saveKb(nextKb);
                          
                          const nextUnanswered = unansweredQ.filter(item=>item.id!==q.id);
                          setUnansweredQ(nextUnanswered);
                          localStorage.setItem('midtn_unanswered_questions', JSON.stringify(nextUnanswered));
                          alert("AI trained successfully! Volley AI can now answer this question.");
                        }} disabled=${!q.answer || !q.answer.trim()} color="#66bb6a">Add to FAQ & Train âœ“<//>
                      </div>
                    </div>
                  `)}
                  ${!unansweredQ.length && html`
                    <div style=${{color:'#66bb6a',textAlign:'center',padding:20,fontSize:12,fontWeight:600}}>
                      ðŸŽ‰ All user questions are answered! Volley AI is fully trained.
                    </div>
                  `}
                </div>
              </div>

            </div>
          </div>

          <!-- Email Sent Log Table -->
          <div class="card" style=${{padding:20,marginTop:20}}>
            <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
              <h3 style=${{color:'#f0a500',fontSize:14,fontWeight:800,margin:0,textTransform:'uppercase',letterSpacing:'0.5px'}}>ðŸ“Š Outbound Email Log</h3>
              <${Btn} sm onClick=${()=>{
                if(confirm("Clear email history?")) {
                  localStorage.removeItem('midtn_email_logs');
                  setEmailLogs([]);
                }
              }} color="#ef5350" outline>Clear Logs<//>
            </div>
            <div style=${{overflowX:'auto',maxHeight:300}}>
              <table>
                <thead>
                  <tr>
                    <th>Date/Time</th>
                    <th>Recipient</th>
                    <th>Email Address</th>
                    <th>Type</th>
                    <th>Status</th>
                    <th>Content Snippet</th>
                  </tr>
                </thead>
                <tbody>
                  ${emailLogs.map(log=>html`
                    <tr key=${log.id}>
                      <td style=${{whiteSpace:'nowrap',fontSize:11}}>${log.date}</td>
                      <td style=${{fontWeight:600}}>${log.recipientName}</td>
                      <td>${log.recipientEmail}</td>
                      <td><${Badge} c=${log.type === 'offer' ? '#f0a500' : '#26c6da'} sm>${log.type}<//></td>
                      <td><span style=${{color: log.status.includes('Failed') ? '#ef5350' : '#66bb6a', fontWeight:700}}>${log.status}</span></td>
                      <td style=${{color:'#78909c',fontFamily:'monospace',fontSize:10}}>${log.content}</td>
                    </tr>
                  `)}
                  ${!emailLogs.length && html`<tr><td colSpan="6" style=${{textAlign:'center',padding:20,color:'#444'}}>No outbound email history</td></tr>`}
                </tbody>
              </table>
            </div>
          </div>
        `}

        ${view==='hidden'&&html`
          <div>
            <h2 style=${{fontSize:17,fontWeight:700,margin:'0 0 14px'}}>Hidden Athletes (${hidden.length})</h2>
            ${hidden.map(a=>html`
              <div key=${a.id} style=${{display:'flex',alignItems:'center',gap:10,padding:'9px 14px',background:'#1a1a10',border:'1px solid #ffa72622',borderRadius:8,marginBottom:4}}>
                <span style=${{fontFamily:'monospace',color:'#4fc3f7',fontSize:11}}>#${a.to}</span>
                <span style=${{fontWeight:600,flex:1,cursor:'pointer'}} onClick=${()=>setSelAth(a)}>${a.first} ${a.last}</span>
                <${Badge} c="#78909c" sm>${a.ageGroup}s<//>
                <${Badge} c="#ffa726" sm>${a.hideReason||'Hidden'}<//>
                <${Btn} sm onClick=${()=>doUnhide(a.id)} color="#66bb6a">Unhide<//>
              </div>`)}
            ${!hidden.length&&html`<div style=${{padding:40,textAlign:'center',color:'#444'}}>No hidden athletes</div>`}
          </div>`}
      </div>

      <${CheckInConfirmModal} athlete=${confirmCheckInAth} onClose=${()=>setConfirmCheckInAth(null)} onConfirm=${handleConfirmArrive}/>
      <${AthleteModal} athlete=${selAth} onClose=${()=>setSelAth(null)} onChange=${upd}
        onHide=${a=>{setSelAth(null);setHideAth(a);}} onUnhide=${doUnhide}
        onEmail=${a=>{setSelAth(null);setEmailAth(a);setEmailTeam(a.teamAssignment||'');}}/>
      <${EmailModal} athlete=${emailAth} team=${emailTeam} onClose=${()=>{setEmailAth(null);setEmailTeam('');}} onSend=${doEmail}/>
      <${HideModal} athlete=${hideAth} onClose=${()=>setHideAth(null)} onHide=${doHide}/>
      <${TeamOfferModal} teamKey=${teamOfferKey} athletes=${athletes} onClose=${()=>setTeamOfferKey(null)} onSendOffer=${(a)=>{setEmailAth(a);setEmailTeam(teamOfferKey);}}/>
    </div>`;
}

function TeamOfferModal({teamKey,athletes,onClose,onSendOffer}){
  if(!teamKey) return null;
  const roster=athletes.filter(a=>a.teamAssignment===teamKey);
  const [age,lvl]=teamKey.split('-');
  return html`
    <div class="modal-overlay" onClick=${onClose}>
      <div class="modal-box" style=${{width:500}} onClick=${e=>e.stopPropagation()}>
        <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <h3 style=${{margin:0}}>${age} ${lvl} â€” Send Offers</h3>
          <button onClick=${onClose} style=${{background:'none',border:'none',color:'#666',fontSize:24,cursor:'pointer'}}>Ã—</button>
        </div>
        <div style=${{maxHeight:400,overflowY:'auto',marginBottom:16}}>
          ${roster.map(a=>html`
            <div key=${a.id} style=${{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:'1px solid #2a2e38'}}>
              <div style=${{flex:1}}>
                <div style=${{fontWeight:700}}>${a.first} ${a.last}</div>
                <div style=${{fontSize:11,color:'#78909c'}}>${posAbbr(a.primaryPos)} Â· ${a.status}</div>
              </div>
              ${['accepted','declined','offered'].includes(a.status)
                ? html`<${Badge} c=${a.status==='accepted'?'#66bb6a':a.status==='declined'?'#ef5350':'#42a5f5'} sm>${a.status}<//>`
                : html`<${Btn} sm onClick=${()=>onSendOffer(a)} color="#f0a500">Send Offer<//>`}
            </div>`)}
        </div>
        <${Btn} onClick=${onClose} style=${{width:'100%'}} color="#2a2e38">Done<//>
      </div>
    </div>`;
}

function App(){
  const [user,setUser]=useState(null);
  const [athletes,setAthletes]=useState(()=>{
    const l=loadLocal();
    return l?initAthletes(l):initAthletes(RAW);
  });

  const updMetric=useCallback((id,key,vals)=>{
    setAthletes(p=>p.map(a=>a.id===id?{...a,metrics:{...a.metrics,[key]:vals}}:a));
  },[]);
  const doArrive=useCallback((id,contactInfo)=>{setAthletes(p=>p.map(a=>a.id===id?{...a,...(contactInfo||{}),arrived:true,status:'arrived'}:a));},[]);
  const addWalkup=useCallback(wu=>{setAthletes(p=>[...p,...initAthletes([wu])]);},[]);
  
  useEffect(()=>{if(athletes.length) saveLocal(athletes);},[athletes]);

  // Real-time synchronization across multiple browser tabs / devices
  useEffect(() => {
    const syncData = (e) => {
      if (e.key === LOCAL_KEY) {
        const next = loadLocal();
        if (next) {
          setAthletes(initAthletes(next));
        }
      }
    };
    window.addEventListener('storage', syncData);
    return () => window.removeEventListener('storage', syncData);
  }, []);

  const isWalkupMode = useMemo(() => {
    return new URLSearchParams(window.location.search).get('mode') === 'walkup';
  }, []);

  if (isWalkupMode) {
    return html`<${WalkupRegister} athletes=${athletes} onAddWalkup=${addWalkup} />`;
  }

  if(!user) return html`<${Login} onLogin=${setUser}/>`;
  if(user.role==='staff') return html`<${StaffDashboard} athletes=${athletes} setAthletes=${setAthletes} onArrive=${doArrive} onAddWalkup=${addWalkup} onMetric=${updMetric} onLogout=${()=>setUser(null)} initialTab=${user.tab}/>`;
  return html`<${HeadCoach} athletes=${athletes} setAthletes=${setAthletes} onLogout=${()=>setUser(null)}/>`;
}
render(html`<${App}/>`,document.getElementById('app'));
</script>
